# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - professor-lookup-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # 安裝全部依賴（含 devDependencies）以便執行爬蟲
      - name: Install server dependencies
        working-directory: project/server
        run: npm ci

      # 執行爬蟲，產生 teachers.db（.gitignore 排除了 .db）
      - name: Run scraper to generate teachers.db
        working-directory: project/server
        run: node scraper.js

      # 移除 node_modules，讓 Azure Linux 環境自行安裝
      # （避免 sqlite3 等原生模組跨平台編譯不相容）
      - name: Remove node_modules before packaging
        working-directory: project/server
        run: rm -rf node_modules

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: project/server

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A3E3F594CEC644438BFBB469660F692C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4E98065DE38042928CBD4BCB84D4F7DE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_741E804EFFF245A092AF9A4C8D4C2072 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'professor-lookup-api'
          slot-name: 'Production'
          package: .