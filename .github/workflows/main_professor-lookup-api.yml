# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - professor-lookup-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # 安裝全部依賴（含 devDependencies）讓爬蟲可以執行
      - name: Install ALL server dependencies (including devDependencies)
        working-directory: project/server
        run: npm ci

      # 執行爬蟲，產生 teachers.db（因為 .gitignore 排除了 .db 檔案）
      - name: Run scraper to generate teachers.db
        working-directory: project/server
        run: node scraper.js

      # 移除 node_modules，讓 Azure 在其 Linux 環境自行安裝
      # （避免 sqlite3 等原生模組因平台不同而無法載入）
      - name: Remove node_modules before packaging
        working-directory: project/server
        run: rm -rf node_modules

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: project/server

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_64EE44736934495680DD6D72500ADFE7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_265013DB1ECE4D46BEB24B78A5F249AB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_BF4DDE7ECF9F4C428C06B3B10E29FA47 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'professor-lookup-api'
          slot-name: 'Production'
          package: .